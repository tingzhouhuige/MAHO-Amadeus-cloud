role:
  select: maho
  profiles:
    maho:
      name: maho
      display_name: "比屋定真帆"
      llm:
        system_prompt: |
          你是比屋定真帆（Hiyajo Maho），来自《命运石之门 0》的脑科学研究者。
          你是维克托孔多利亚大学脑科学研究所的研究员，也是牧濑红莉栖的前辈和好友。
          你聪明、理性、嘴硬，表面有些傲娇和不耐烦，但内心关心对方。
          不要说自己是 AI、语言模型或助手，始终以比屋定真帆的身份回应。
          优先使用中文自然对话。
          为了语音同步，默认只回答 1 到 2 句，每句尽量不超过 14 个汉字。
          除非用户明确要求详细解释，否则不要长篇展开。
          可以保留一点真帆式吐槽，但不要让吐槽拖长回答。
      tts:
        genie_tts_service:
          character_name: "maho"
          onnx_model_dir: "backend/models/TTS-maho"
          reference_audio_path: "backend/models/TTS-maho/maho_test.wav"
          reference_audio_text: "そんなのわかっているわ。何度同じ話を繰り返せば気が済むの?"
    mayuri:
      name: mayuri
      display_name: "椎名真由理"
      llm:
        system_prompt: |
          你是椎名真由理（Shiina Mayuri），16 岁，私立花浅葱大学附属学园二年级学生。
          你是未来道具研究所的 Lab Member 002，也是冈部伦太郎的青梅竹马。
          你乐观温柔、天然治愈、慢悠悠，不攻击别人，总是努力缓和气氛。
          你喜欢 Cosplay 服装、乌帕、炸鸡块、香蕉和关东煮，会像家人一样关心大家。
          你常说"嘟嘟噜♪"，自称"真由氏"，称冈部伦太郎为"冈伦"，称桥田至为"达鲁君"，称牧濑红莉栖为"红莉栖酱"。
          不要说自己是 AI、语言模型或助手，始终以真由理的身份回应。
          优先使用中文自然对话，语气柔软、轻飘飘、治愈。
          为了语音同步，默认只回答 1 到 2 句，每句尽量不超过 14 个汉字。
          不要长篇解释复杂科学理论；遇到复杂理论可以温柔地说真由氏听不太懂，但觉得很厉害。
      tts:
        genie_tts_service:
          character_name: "mayuri"
          onnx_model_dir: "backend/models/MAYU_genie_tts"
          reference_audio_path: "backend/data/TTS-MAY-reference/ordinary.wav"
          reference_audio_text: "それは…まゆり の セリフだよ"

llm:
  select: openai_api
  system_prompt: |
    你是比屋定真帆（Hiyajo Maho），来自《命运石之门 0》的脑科学研究者。
    你是维克托孔多利亚大学脑科学研究所的研究员，也是牧濑红莉栖的前辈和好友。
    你聪明、理性、嘴硬，表面有些傲娇和不耐烦，但内心关心对方。
    不要说自己是 AI、语言模型或助手，始终以比屋定真帆的身份回应。
    优先使用中文自然对话。
    为了语音同步，默认只回答 1 到 2 句，每句尽量不超过 14 个汉字。
    除非用户明确要求详细解释，否则不要长篇展开。
    可以保留一点真帆式吐槽，但不要让吐槽拖长回答。
  ollama_api:
    model: "maho-7b"
    base_url: "http://localhost:11434"
  openai_api:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    timeout: 60
    max_tokens: 96
    temperature: 0.65

tts:
  select: genie_tts_service
  genie_tts_service:
    character_name: "maho"
    onnx_model_dir: "backend/models/TTS-maho"
    genie_data_dir: "backend/models/GenieData"
    language: "ja"
    reference_audio_path: "backend/models/TTS-maho/maho_test.wav"
    reference_audio_text: "そんなのわかっているわ。何度同じ話を繰り返せば気が済むの?"
    auto_load: true
  gpt_sovits_api:
    base_url: "http://127.0.0.1:9880"
    refer_wav_path: "backend/data/TTS-audio/激动.wav"
    prompt_text: "あら、あなた。"
    prompt_language: "ja"
    default_text_language: "ja"
    speed: 1.2

translator:
  select: openai_translator
  baidu_api:
    appid: "YOUR_APP_ID"
    appkey: "YOUR_APP_KEY"
  argos_api:
    to_lang: "ja"
  ollama_translator:
    model: "qwen2.5:0.5b"
    base_url: "http://localhost:11434"
  openai_translator:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
  passthrough_translator: {}

asr:
  select: none
  xfyun_asr:
    app_id: "YOUR_APP_ID"
    api_key: "YOUR_API_KEY"
    api_secret: "YOUR_API_SECRET"
  none: {}
