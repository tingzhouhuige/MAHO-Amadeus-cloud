    可以保留一点真帆式吐槽，但不要让吐槽拖长回答。
  ollama_api:
    model: "maho-7b"
    base_url: "http://localhost:11434"
  openai_api:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    timeout: 60
    max_tokens: 96
    temperature: 0.65

tts:
  select: genie_tts_service
  genie_tts_service:
    character_name: "maho"
    onnx_model_dir: "backend/models/TTS-maho"
    genie_data_dir: "backend/models/GenieData"
    language: "ja"
    reference_audio_path: "backend/models/TTS-maho/maho_test.wav"
    reference_audio_text: "そんなのわかっているわ。何度同じ話を繰り返せば気が済むの?"
    auto_load: true
  gpt_sovits_api:
    base_url: "http://127.0.0.1:9880"
    refer_wav_path: "backend/data/TTS-audio/激动.wav"
    prompt_text: "あら、あなた。"
    prompt_language: "ja"
    default_text_language: "ja"
    speed: 1.2

translator:
  select: openai_translator
  baidu_api:
    appid: "YOUR_APP_ID"
    appkey: "YOUR_APP_KEY"
  argos_api:
    to_lang: "ja"
  ollama_translator:
    model: "qwen2.5:0.5b"
    base_url: "http://localhost:11434"
  openai_translator:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
  passthrough_translator: {}

asr:
  select: none
  xfyun_asr:
    app_id: "YOUR_APP_ID"
    api_key: "YOUR_API_KEY"
    api_secret: "YOUR_API_SECRET"
  none: {}
